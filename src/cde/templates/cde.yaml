# cde.yaml — project-level config for `cde`.
# Edit this file once per project. The CLI reads it from the project root.

# ---------------------------------------------------------------------------
# Required
# ---------------------------------------------------------------------------

# Logical project name. cde history is partitioned by this — multiple
# projects under the same parent dir (e.g. several experiments inside a
# maxtext clone) get separate run histories. Default is the basename of
# the project directory; edit if that's not the right grouping.
project: REPLACE-ME

image:
  registry: gcr.io/REPLACE-ME              # change this
  name: REPLACE-ME                         # final tag is auto: <name>:cde-<sha7>
  dockerfile: ./Dockerfile
  context: .
  # Optional crane-append fast-path. When `base_image` is set, `cde build`
  # skips docker build entirely and uses `crane mutate --append` to layer
  # the local source onto a pre-built base image. ~1-2s per build, no
  # Docker daemon required. Equivalent to xpk's --base-docker-image +
  # --script-dir. Requires the `crane` binary on PATH (install:
  # https://github.com/google/go-containerregistry/tree/main/cmd/crane).
  # base_image: gcr.io/your-proj/your-base:v1
  # workdir: /app                            # where source lands in the image

# Path to the Jinja2 JobSet template, relative to project root.
template: ./manifests/jobset.yaml.j2

# Team key from the cluster's team-quota ConfigMap. xpk / kubectl uses
# this to route the workload.
team: REPLACE-ME

# ---------------------------------------------------------------------------
# Optional — sane defaults are applied when these are absent
# ---------------------------------------------------------------------------

defaults:
  value-class: development                 # one of valueClasses in the ConfigMap
  declared-duration-minutes: 60            # honest p90; controller stops at min(team_cap, x*1.5)
  tpu-type: tpu7x-128                      # informational; the template uses this
  num-slices: 1

# Skaffold-replacement: paths cde sync mirrors into a running pod.
# Empty = sync mode unavailable. Add as you find files worth syncing.
sync: []
# - src: src/                              # local path
#   dest: /workspace/src/                  # in-pod path

# Auto-wired profile location. cde run --profile sets
# JAX_PROFILER_DIR=<base-uri>/<run_id>/ in the pod's env.
# profile:
#   base-uri: gs://my-bucket/cde-profiles

history: {}
  # path: ~/.cde/history.sqlite            # default — uses $CDE_HOME if set
  # gcs_uri: gs://my-bucket/cde/runs.jsonl # opt-in multi-machine write-through

# Default values made available to the template under {{ overrides.* }}.
# Override per-run with `cde run --set key=value`. Use `cde run --flag NAME`
# (or `--no-flag NAME`) for bare boolean flags that don't take a value.
#
# By default cde derives:
#   namespace      = team-<team>
#   priority_class = <namespace>-priority
# If your cluster doesn't follow that convention (e.g. shared `poc-dev`
# namespace), uncomment the keys below to pin them.
defaults_overrides: {}
# defaults_overrides:
#   batch_size: 1024
#   ep: 32
#   # namespace: poc-dev
#   # priority_class: poc-dev-priority
#
#   # XLA / JAX compilation cache. Defaulting to a per-run prefix means
#   # every `cde run` cold-compiles, which can swing perf 5-10% on the
#   # same image+args. For repeated iteration on the same model, prefer a
#   # stable prefix keyed off the model+config (NOT run_id):
#   # jax_compilation_cache_dir: gs://my-bucket/jax-cc/<model>-<topology>-<gbs>
